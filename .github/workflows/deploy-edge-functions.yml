name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

concurrency:
  group: deploy-edge-functions-${{ github.ref }}
  cancel-in-progress: false

env:
  FUNCTIONS: >-
    sync-calendar-events
    send-push-notification
    detect-absences
    invite-servant
    delete-auth-user

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy to preview (ljnuaefrsfscqnywvojd)
        run: supabase functions deploy $FUNCTIONS --project-ref ljnuaefrsfscqnywvojd

  deploy-production:
    needs: deploy-preview
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy to production (hdcwafpagxujovqivzzz)
        run: supabase functions deploy $FUNCTIONS --project-ref hdcwafpagxujovqivzzz
