name: Build mobile app (EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (production = APK sideload, production-aab = AAB for Play Store)
        required: true
        default: development
        type: choice
        options:
          - development
          - preview
          - production
          - production-aab
      platform:
        description: Target platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    name: ${{ inputs.profile }} / ${{ inputs.platform }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Queue EAS build
        run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive --no-wait
