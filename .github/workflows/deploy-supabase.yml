name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'Makefile'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: false

# Both jobs use the same Makefile targets a developer would run locally
# (`make deploy-migrations` / `make deploy-functions`). The Makefile
# derives the project ref from `PROJECT=preview|prod` and skips its
# interactive confirmation when stdin is not a TTY (CI runners aren't),
# so no extra wiring is needed.

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        run: make deploy-migrations PROJECT=preview
      - name: Deploy functions
        run: make deploy-functions PROJECT=preview

  deploy-production:
    needs: deploy-preview
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        run: make deploy-migrations PROJECT=prod
      - name: Deploy functions
        run: make deploy-functions PROJECT=prod
