name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: false

env:
  FUNCTIONS: >-
    sync-calendar-events
    send-push-notification
    detect-absences
    invite-servant
    delete-auth-user

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ljnuaefrsfscqnywvojd
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link
        run: supabase link --project-ref $PROJECT_REF
      - name: Push migrations
        run: supabase db push
      - name: Deploy functions
        run: supabase functions deploy $FUNCTIONS --project-ref $PROJECT_REF

  deploy-production:
    needs: deploy-preview
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: hdcwafpagxujovqivzzz
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link
        run: supabase link --project-ref $PROJECT_REF
      - name: Push migrations
        run: supabase db push
      - name: Deploy functions
        run: supabase functions deploy $FUNCTIONS --project-ref $PROJECT_REF
